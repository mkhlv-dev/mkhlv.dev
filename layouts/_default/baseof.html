<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Params.name }} — {{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.tagline }}">
  <meta name="author" content="{{ .Site.Params.name }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ .Site.Params.name }} — {{ .Site.Title }}">
  <meta property="og:description" content="{{ .Site.Params.tagline }}">
  <meta property="og:url" content="{{ .Site.BaseURL }}">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&gt;_</text></svg>">
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <div class="grain" aria-hidden="true"></div>
  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>
</body>
</html>
