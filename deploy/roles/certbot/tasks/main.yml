- name: Install snapd
  ansible.builtin.apt:
    name: snapd
    state: present

- name: Install certbot snap
  community.general.snap:
    name: certbot
    classic: true

- name: Symlink certbot binary
  ansible.builtin.file:
    src: /snap/bin/certbot
    dest: /usr/bin/certbot
    state: link
    force: true
