- name: Create deploy group
  ansible.builtin.group:
    name: "{{ deploy_user }}"
    state: present

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    shell: /bin/bash
    create_home: true

- name: Authorize SSH keys for deploy user
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ deploy_authorized_keys }}"

- name: Allow deploy user to reload nginx without password
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    mode: "0440"
    content: |
      {{ deploy_user }} ALL=(root) NOPASSWD: /bin/systemctl reload nginx, /bin/systemctl restart nginx
    validate: visudo -cf %s
