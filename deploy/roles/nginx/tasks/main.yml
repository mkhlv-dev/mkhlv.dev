- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Disable default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Ensure nginx is enabled and started
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
